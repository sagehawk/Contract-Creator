<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ChainForge AI — Autonomous Proposal Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] },
        animation: {
          'fade-in': 'fadeIn .5s ease-out forwards',
          'slide-in': 'slideIn .4s ease-out forwards',
          'pulse-dot': 'pulseDot 2s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from:{opacity:'0'}, to:{opacity:'1'} },
          slideIn: { from:{opacity:'0',transform:'translateY(12px)'}, to:{opacity:'1',transform:'translateY(0)'} },
          pulseDot: { '0%,100%':{opacity:'1',transform:'scale(1)'}, '50%':{opacity:'.4',transform:'scale(.8)'} },
        }
      }}
    }
  </script>
  <style>
    body { background: #03071e; }
    .gradient-text { background: linear-gradient(135deg,#4d9fff,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .glass { background: rgba(255,255,255,.025); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.07); }
    .feed-entry { opacity:0; animation: slideIn .35s ease-out forwards; }
    .orb { position:absolute; border-radius:50%; filter:blur(100px); pointer-events:none; }
    #proposalFrame { border:none; width:100%; height:100vh; opacity:0; transition: opacity .8s ease-in-out; }
    #proposalFrame.visible { opacity:1; }
    .input-field { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); transition:all .2s; }
    .input-field:focus { background:rgba(255,255,255,.06); border-color:rgba(77,159,255,.5); box-shadow:0 0 0 3px rgba(77,159,255,.1); outline:none; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.2); }
  </style>
</head>
<body class="font-sans text-white min-h-screen overflow-x-hidden">

  <!-- Background orbs -->
  <div class="orb w-96 h-96 bg-blue-600/20 -top-32 -left-32"></div>
  <div class="orb w-80 h-80 bg-purple-600/15 top-1/2 -right-20"></div>

  <!-- ==================== PHASE 1: Input + Feed ==================== -->
  <div id="phase1" class="relative z-10 min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="flex items-center justify-between px-6 py-4 border-b border-white/5">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="font-bold text-lg tracking-tight">ChainForge <span class="text-blue-400">AI</span></span>
      </div>
      <div class="flex items-center gap-4">
        <div id="timer" class="hidden text-xs font-mono text-slate-500">00:00</div>
        <div id="tokenCount" class="hidden text-xs font-mono text-slate-600"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse-dot"></div>
          <span class="text-[11px] text-white/40 font-medium uppercase tracking-widest">Agent Online</span>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div class="flex-1 flex flex-col items-center px-6 py-8">

      <!-- Hero -->
      <div id="heroBlock" class="text-center mb-10 transition-all duration-500">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass text-xs text-blue-300 font-medium mb-6 border border-blue-500/20">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
          Powered by Claude &middot; Autonomous ReAct Loop
        </div>
        <h1 class="text-4xl md:text-5xl font-black tracking-tight leading-tight mb-4">
          Watch the Agent<br/><span class="gradient-text">Build Your Proposal</span>
        </h1>
        <p class="text-base text-white/40 max-w-md mx-auto">Real-time operational transparency. Every thought, tool call, and decision — live.</p>
      </div>

      <!-- Input Card -->
      <div id="inputCard" class="w-full max-w-xl mx-auto glass rounded-2xl p-6 mb-6 transition-all duration-500">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-[11px] font-semibold text-white/50 uppercase tracking-widest mb-1.5">Target Company</label>
            <input id="clientName" type="text" value="Globex Corp" class="input-field w-full rounded-lg px-3.5 py-2.5 text-white placeholder-white/20 text-sm font-medium"/>
          </div>
          <div>
            <label class="block text-[11px] font-semibold text-white/50 uppercase tracking-widest mb-1.5">Product Tier</label>
            <input id="productTier" type="text" value="Enterprise Logistics API" class="input-field w-full rounded-lg px-3.5 py-2.5 text-white placeholder-white/20 text-sm font-medium"/>
          </div>
        </div>
        <button id="btnGenerate" onclick="startGeneration()" class="w-full py-3 rounded-xl font-bold text-sm tracking-wide bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 transition-all duration-200 hover:shadow-[0_0_30px_rgba(77,159,255,.3)]">
          Generate Autonomous Proposal
        </button>
      </div>

      <!-- Live Agent Feed -->
      <div id="feedContainer" class="hidden w-full max-w-3xl mx-auto flex-1 flex flex-col min-h-0">
        <div class="flex items-center gap-2 mb-4">
          <div class="text-[11px] font-semibold text-white/40 uppercase tracking-widest">ReAct Loop</div>
          <div id="stepBadge" class="px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 text-[11px] font-bold">Step 1</div>
          <div class="flex-1"></div>
          <div id="statusDot" class="flex items-center gap-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse-dot"></div>
            <span id="statusText" class="text-[11px] text-white/40 font-medium">Initializing...</span>
          </div>
        </div>
        <div id="feed" class="flex-1 overflow-y-auto pr-2 space-y-2 pb-4" style="max-height:calc(100vh - 200px);"></div>
      </div>
    </div>
  </div>

  <!-- ==================== PHASE 2: Proposal Reveal ==================== -->
  <div id="phase2" class="fixed inset-0 z-50 hidden" style="background:#03071e;">
    <div class="fixed top-4 left-4 z-[60]">
      <button onclick="showFeed()" class="flex items-center gap-2 px-3 py-2 rounded-lg glass text-xs text-white/60 hover:text-white/90 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Agent Feed
      </button>
    </div>
    <iframe id="proposalFrame"></iframe>
  </div>

  <script>
    let eventSource = null, timerInterval = null, startTime = 0;
    let totalTokensIn = 0, totalTokensOut = 0, entryIndex = 0;

    const typeConfig = {
      connected:   { icon:'&#9889;', label:'CONNECTED',   color:'text-blue-300',    bg:'border-blue-500/10' },
      step:        { icon:'&#8594;', label:'STEP',        color:'text-white/70',    bg:'border-white/5' },
      status:      { icon:'&#9702;', label:'STATUS',      color:'text-slate-400',   bg:'border-slate-500/10' },
      reasoning:   { icon:'&#129504;', label:'REASONING', color:'text-purple-300',  bg:'border-purple-500/10' },
      action:      { icon:'&#9881;', label:'ACTION',      color:'text-amber-300',   bg:'border-amber-500/10' },
      observation: { icon:'&#128225;', label:'OBSERVATION',color:'text-emerald-300', bg:'border-emerald-500/10' },
      error:       { icon:'&#10005;', label:'ERROR',      color:'text-red-400',     bg:'border-red-500/10' },
    };

    function addEntry(type, content, meta) {
      const feed = document.getElementById('feed');
      const cfg = typeConfig[type] ?? typeConfig.status;
      const el = document.createElement('div');
      el.className = `feed-entry border-l-2 ${cfg.bg} pl-4 py-2`;
      el.style.animationDelay = `${Math.min(entryIndex * 30, 150)}ms`;
      let h = '';

      if (type === 'step') {
        el.className = 'feed-entry pl-0 py-1';
        h = `<div class="flex items-center gap-2 py-1"><div class="h-px flex-1 bg-gradient-to-r from-blue-500/30 to-transparent"></div><span class="text-[11px] font-bold text-blue-400 uppercase tracking-widest">ReAct Step ${meta?.step??'?'}</span><div class="h-px flex-1 bg-gradient-to-l from-blue-500/30 to-transparent"></div></div>`;
      } else if (type === 'reasoning') {
        h = `<div class="flex items-start gap-2"><span class="text-[10px] font-bold tracking-widest ${cfg.color} whitespace-nowrap mt-0.5">${cfg.icon} ${cfg.label}</span></div><div class="mt-1.5 text-sm text-slate-300/80 leading-relaxed">${escH(content)}</div>`;
      } else if (type === 'action') {
        h = `<div class="flex items-start gap-2"><span class="text-[10px] font-bold tracking-widest ${cfg.color} whitespace-nowrap mt-0.5">${cfg.icon} ${cfg.label}</span></div>
        <div class="mt-1.5 flex items-center gap-2"><span class="px-2 py-0.5 rounded bg-amber-500/10 text-amber-300 text-xs font-bold font-mono">${escH(meta?.tool??'')}</span></div>
        ${meta?.args ? `<div class="mt-1 text-xs text-slate-500 font-mono break-all max-h-20 overflow-hidden">${escH(meta.args.slice(0,200))}</div>` : ''}`;
      } else if (type === 'observation') {
        h = `<div class="flex items-start gap-2"><span class="text-[10px] font-bold tracking-widest ${cfg.color} whitespace-nowrap mt-0.5">${cfg.icon} ${cfg.label}</span></div>
        <div class="mt-1.5"><span class="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-300 text-xs font-bold font-mono">${escH(meta?.tool??'')} returned</span></div>
        <div class="mt-1 text-xs text-slate-400 font-mono leading-relaxed max-h-32 overflow-hidden">${escH(content.slice(0,400))}${content.length>400?'...':''}</div>`;
      } else if (type === 'error') {
        h = `<div class="flex items-start gap-2"><span class="text-[10px] font-bold tracking-widest ${cfg.color}">${cfg.icon} ${cfg.label}</span></div><div class="mt-1.5 text-sm text-red-300">${escH(content)}</div>`;
      } else {
        h = `<div class="flex items-start gap-2"><span class="text-[10px] font-bold tracking-widest ${cfg.color}">${cfg.icon} ${cfg.label}</span></div><div class="mt-1 text-xs text-slate-400">${escH(content)}</div>`;
      }

      el.innerHTML = h;
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
      entryIndex++;
    }

    function escH(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    function startTimer() {
      startTime = Date.now();
      const el = document.getElementById('timer');
      el.classList.remove('hidden');
      timerInterval = setInterval(() => {
        const s = Math.floor((Date.now()-startTime)/1000);
        el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      }, 250);
    }
    function stopTimer() { clearInterval(timerInterval); }

    function updateTokens(i,o) {
      totalTokensIn+=i; totalTokensOut+=o;
      const el=document.getElementById('tokenCount');
      el.classList.remove('hidden');
      el.textContent=`${totalTokensIn.toLocaleString()} in / ${totalTokensOut.toLocaleString()} out`;
    }

    function startGeneration() {
      const cn = document.getElementById('clientName').value.trim()||'Globex Corp';
      const pt = document.getElementById('productTier').value.trim()||'Enterprise Logistics API';

      // Collapse inputs
      ['heroBlock','inputCard'].forEach(id => {
        const el=document.getElementById(id);
        el.style.maxHeight='0'; el.style.overflow='hidden'; el.style.opacity='0'; el.style.margin='0'; el.style.padding='0';
      });

      document.getElementById('feedContainer').classList.remove('hidden');
      document.getElementById('feedContainer').classList.add('flex');
      document.getElementById('feed').innerHTML='';
      entryIndex=0; totalTokensIn=0; totalTokensOut=0;
      startTimer();

      const params=new URLSearchParams({clientName:cn,productTier:pt});
      eventSource=new EventSource(`/api/stream?${params}`);

      eventSource.addEventListener('connected', e=>{ const d=JSON.parse(e.data); addEntry('connected',d.message); document.getElementById('statusText').textContent='Connected'; });
      eventSource.addEventListener('step', e=>{ const d=JSON.parse(e.data); addEntry('step','',d); document.getElementById('stepBadge').textContent=`Step ${d.step}`; });
      eventSource.addEventListener('status', e=>{ const d=JSON.parse(e.data); document.getElementById('statusText').textContent=d.message; });
      eventSource.addEventListener('reasoning', e=>{ const d=JSON.parse(e.data); document.getElementById('statusText').textContent='Reasoning...'; addEntry('reasoning',d.content); });
      eventSource.addEventListener('action', e=>{ const d=JSON.parse(e.data); document.getElementById('statusText').textContent=`Calling ${d.tool}...`; addEntry('action','',d); });
      eventSource.addEventListener('observation', e=>{ const d=JSON.parse(e.data); document.getElementById('statusText').textContent=`${d.tool} returned`; addEntry('observation',d.result,d); });
      eventSource.addEventListener('tokens', e=>{ const d=JSON.parse(e.data); updateTokens(d.input,d.output); });

      eventSource.addEventListener('complete', e=>{
        const d=JSON.parse(e.data);
        stopTimer();
        document.getElementById('statusText').textContent='Proposal ready';
        document.getElementById('statusDot').querySelector('div').className='w-1.5 h-1.5 rounded-full bg-emerald-400';
        addEntry('connected','Proposal generated successfully. Revealing...');
        eventSource.close(); eventSource=null;
        setTimeout(()=>revealProposal(d.html), 1200);
      });

      eventSource.addEventListener('error', e=>{
        try{ const d=JSON.parse(e.data); addEntry('error',d.message); } catch{ addEntry('error','Connection lost'); }
        stopTimer();
        document.getElementById('statusText').textContent='Error';
        if(eventSource){eventSource.close();eventSource=null;}
      });

      eventSource.onerror=()=>{};
    }

    function revealProposal(html) {
      const p2=document.getElementById('phase2'), fr=document.getElementById('proposalFrame');
      p2.classList.remove('hidden');
      fr.srcdoc=html;
      fr.onload=()=>requestAnimationFrame(()=>fr.classList.add('visible'));
    }

    function showFeed() {
      const fr=document.getElementById('proposalFrame');
      fr.classList.remove('visible');
      setTimeout(()=>{ document.getElementById('phase2').classList.add('hidden'); fr.srcdoc=''; }, 400);
    }
  </script>
</body>
</html>
